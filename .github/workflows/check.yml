name: Check

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Design lint
        run: npm run lint:design

      - name: Boundary lint
        run: npm run lint:boundary

      - name: Docs in sync
        run: npm run docs:check

      - name: Tool catalog in sync
        run: npm run catalog:check

      - name: Tests + coverage floor
        run: npm run test:coverage
